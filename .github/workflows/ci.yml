name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore QuickSSH.slnx

      - name: Build
        run: dotnet build QuickSSH.slnx --no-restore -c Debug

      - name: Test
        run: dotnet test Tests/Flow.Launcher.Plugin.QuickSSH.Tests.csproj --no-build --logger "console;verbosity=normal"
