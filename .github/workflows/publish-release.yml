name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Verify version matches tag
        id: version
        shell: pwsh
        run: |
          $pluginVersion = (Get-Content "plugin.json" | ConvertFrom-Json).Version
          $tag = "${{ github.ref_name }}"
          if ($tag -ne "v$pluginVersion") {
            throw "Tag $tag nesedi s plugin.json verziou $pluginVersion"
          }
          echo "version=$pluginVersion" >> $env:GITHUB_OUTPUT

      - name: Build
        shell: pwsh
        run: |
          dotnet publish Flow.Launcher.Plugin.QuickSSH.csproj -c Release -r win-x64 --no-self-contained -o "Flow.Launcher.Plugin.QuickSSH"
          7z a -tzip "Flow.Launcher.Plugin.QuickSSH.zip" "./Flow.Launcher.Plugin.QuickSSH/*"

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: Flow.Launcher.Plugin.QuickSSH.zip
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
