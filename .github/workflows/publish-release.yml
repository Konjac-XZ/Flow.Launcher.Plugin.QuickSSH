name: Publish Release

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: publish-release-main
  cancel-in-progress: false

jobs:
  publish:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      !contains(join(github.event.pull_request.labels.*.name, ','), 'skip-release')
    runs-on: windows-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Validate release labels
        shell: pwsh
        run: |
          $event = Get-Content $env:GITHUB_EVENT_PATH | ConvertFrom-Json
          $labels = @($event.pull_request.labels | ForEach-Object { $_.name })

          $releaseLabels = @($labels | Where-Object { $_ -in @("release:patch", "release:minor", "release:major") })

          if ($releaseLabels.Count -eq 0) {
            Write-Error "No release label found. Add exactly one of: release:patch, release:minor, release:major"
            exit 1
          }

          if ($releaseLabels.Count -gt 1) {
            Write-Error "Multiple conflicting release labels found: $($releaseLabels -join ', '). Only one is allowed."
            exit 1
          }

          Write-Host "Release label: $($releaseLabels[0])"

      - name: Read version from plugin.json
        id: meta
        shell: pwsh
        run: |
          $manifest = Get-Content "plugin.json" | ConvertFrom-Json
          $version = $manifest.Version
          if ([string]::IsNullOrWhiteSpace($version)) {
            Write-Error "Version not found in plugin.json"
            exit 1
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Version: $version"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Build plugin
        shell: pwsh
        run: |
          dotnet publish "Flow.Launcher.Plugin.QuickSSH.csproj" `
            -c Release `
            -r win-x64 `
            --no-self-contained `
            -o "QuickSSH"

      - name: Create ZIP
        shell: pwsh
        run: |
          if (Test-Path "QuickSSH.zip") {
            Remove-Item "QuickSSH.zip" -Force
          }

          7z a -tzip "QuickSSH.zip" ".\QuickSSH\*"

      - name: Create tag
        shell: pwsh
        run: |
          git tag "${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Release ${{ steps.meta.outputs.tag }}
          files: QuickSSH.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
