name: Publish Release

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: publish-release-main
  cancel-in-progress: false

jobs:
  publish:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      !contains(join(github.event.pull_request.labels.*.name, ','), 'skip-release')
    runs-on: windows-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Validate release labels
        id: labels
        shell: pwsh
        run: |
          $event = Get-Content $env:GITHUB_EVENT_PATH | ConvertFrom-Json
          $labels = @($event.pull_request.labels | ForEach-Object { $_.name })

          $releaseLabels = @($labels | Where-Object { $_ -in @("release:patch", "release:minor", "release:major") })

          if ($releaseLabels.Count -eq 0) {
            Write-Error "No release label found. Add exactly one of: release:patch, release:minor, release:major"
            exit 1
          }

          if ($releaseLabels.Count -gt 1) {
            Write-Error "Multiple conflicting release labels found: $($releaseLabels -join ', '). Only one is allowed."
            exit 1
          }

          $bump = $releaseLabels[0] -replace '^release:', ''
          "bump=$bump" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Release bump type: $bump"

      - name: Bump version in plugin.json
        id: meta
        shell: pwsh
        run: |
          $newVersion = ./scripts/bump-version.ps1 -Bump "${{ steps.labels.outputs.bump }}"
          if ([string]::IsNullOrWhiteSpace($newVersion)) {
            Write-Error "bump-version.ps1 did not return a version"
            exit 1
          }
          "version=$newVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=v$newVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "New version: $newVersion"

      - name: Commit updated plugin.json
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugin.json
          git commit -m "chore: bump version to ${{ steps.meta.outputs.version }}"
          git pull --rebase origin main
          git push origin main

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Build plugin
        shell: pwsh
        run: |
          dotnet publish "Flow.Launcher.Plugin.QuickSSH.csproj" `
            -c Release `
            -r win-x64 `
            --no-self-contained `
            -o "QuickSSH"

      - name: Create ZIP
        shell: pwsh
        run: |
          if (Test-Path "QuickSSH.zip") {
            Remove-Item "QuickSSH.zip" -Force
          }

          7z a -tzip "QuickSSH.zip" ".\QuickSSH\*"

      - name: Create tag
        shell: pwsh
        run: |
          git tag "${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Release ${{ steps.meta.outputs.tag }}
          files: QuickSSH.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
