name: Publish Release

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: publish-release-main
  cancel-in-progress: false

jobs:
  publish:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      !contains(join(github.event.pull_request.labels.*.name, ','), 'skip-release')
    runs-on: windows-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Resolve next version
        id: meta
        shell: pwsh
        run: |
          $event = Get-Content $env:GITHUB_EVENT_PATH | ConvertFrom-Json
          $labels = @($event.pull_request.labels | ForEach-Object { $_.name })

          $bump = "patch"
          if ($labels -contains "release:major") {
            $bump = "major"
          }
          elseif ($labels -contains "release:minor") {
            $bump = "minor"
          }
          elseif ($labels -contains "release:patch") {
            $bump = "patch"
          }

          $plugin = Get-Content "plugin.json" | ConvertFrom-Json
          $current = [Version]$plugin.Version

          $major = $current.Major
          $minor = $current.Minor
          $patch = $current.Build

          switch ($bump) {
            "major" {
              $major++
              $minor = 0
              $patch = 0
            }
            "minor" {
              $minor++
              $patch = 0
            }
            default {
              $patch++
            }
          }

          $newVersion = "$major.$minor.$patch"
          $newTag = "v$newVersion"

          $plugin.Version = $newVersion
          $plugin | ConvertTo-Json -Depth 10 | Set-Content "plugin.json" -Encoding UTF8

          "version=$newVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$newTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "bump=$bump" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Commit version bump and create tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add plugin.json
          git commit -m "chore: release ${{ steps.meta.outputs.tag }}"
          git tag "${{ steps.meta.outputs.tag }}"

          git push origin HEAD:main
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Build plugin
        shell: pwsh
        run: |
          dotnet publish "Flow.Launcher.Plugin.QuickSSH.csproj" `
            -c Release `
            -r win-x64 `
            --no-self-contained `
            -o "QuickSSH"

      - name: Create ZIP
        shell: pwsh
        run: |
          if (Test-Path "QuickSSH.zip") {
            Remove-Item "QuickSSH.zip" -Force
          }

          7z a -tzip "QuickSSH.zip" ".\QuickSSH\*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Release ${{ steps.meta.outputs.tag }}
          files: QuickSSH.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
